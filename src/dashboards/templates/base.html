<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DQ Inspector{% endblock %}</title>

    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    {% block head %}{% endblock %}
</head>

<body>

    <div class="app-shell">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="logo-mark">DQ</span>
                <div>
                    <div class="logo-title">Inspector</div>
                    <div class="logo-sub">Data Quality Suite</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}" data-color="purple">
                    <i class="ti ti-layout-dashboard nav-icon"></i>
                    Overview
                </a>
                <a href="/coverage" class="nav-item {% if request.path == '/coverage' %}active{% endif %}" data-color="blue">
                    <i class="ti ti-database nav-icon"></i>
                    Coverage
                </a>
                <a href="/noise" class="nav-item {% if request.path == '/noise' %}active{% endif %}" data-color="orange">
                    <i class="ti ti-wave-sine nav-icon"></i>
                    Noise
                </a>
                <a href="/integrity" class="nav-item {% if request.path == '/integrity' %}active{% endif %}" data-color="green">
                    <i class="ti ti-shield-check nav-icon"></i>
                    Integrity
                </a>
                <a href="/duplicates" class="nav-item {% if request.path == '/duplicates' %}active{% endif %}" data-color="red">
                    <i class="ti ti-copy nav-icon"></i>
                    Duplicates
                </a>
            </nav>

            <div class="sidebar-footer">
                <span class="mono muted">v1.0.0</span>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <div class="page-inner">
                {% block content %}{% endblock %}
            </div>
        </main>

    </div>
    <footer class="app-footer">
        © 2026 Adem Sghaier • Data Inspector v1.0
    </footer>
</body>
</html>
